<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZKvíz — mockup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
  }

  /* Hex background pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='52' viewBox='0 0 60 52' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolygon points='30,2 58,16 58,36 30,50 2,36 2,16' fill='none' stroke='%23ffffff08' stroke-width='1'/%3E%3C/svg%3E");
    background-size: 60px 52px;
    pointer-events: none;
    z-index: 0;
  }

  .game-wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    width: 100%;
    max-width: 680px;
  }

  /* Title */
  .game-title {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .game-title h1 {
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #f97316, #fbbf24);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .round-badge {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 4px 14px;
    color: #94a3b8;
    font-size: 0.8rem;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Round switcher */
  .round-switcher {
    display: flex;
    gap: 8px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 4px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .round-btn {
    padding: 6px 20px;
    border-radius: 8px;
    border: none;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    color: #64748b;
    background: transparent;
  }
  .round-btn.active {
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: white;
    box-shadow: 0 2px 12px rgba(249,115,22,0.4);
  }

  /* Board container */
  .board-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    padding: 8px 0;
  }

  .hex-row {
    display: flex;
    justify-content: center;
    gap: 5px;
    margin-top: -18px;
  }
  .hex-row:first-child {
    margin-top: 0;
  }

  /* Hexagon */
  .hex {
    width: 72px;
    height: 83px;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.05rem;
    font-weight: 800;
    cursor: default;
    transition: transform 0.15s, filter 0.15s;
    position: relative;
    letter-spacing: -0.5px;
  }

  .hex:hover {
    transform: scale(1.06);
    z-index: 10;
  }

  /* States */
  .hex.free {
    background: linear-gradient(160deg, #e2e8f0 0%, #cbd5e1 50%, #94a3b8 100%);
    color: #1e293b;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
  }

  .hex.active {
    background: linear-gradient(160deg, #fde68a 0%, #fbbf24 50%, #d97706 100%);
    color: #1c1009;
    filter: drop-shadow(0 0 14px rgba(251,191,36,0.8)) drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    animation: pulse 1.2s ease-in-out infinite;
  }

  .hex.p1 {
    background: linear-gradient(160deg, #fb923c 0%, #f97316 50%, #c2410c 100%);
    color: white;
    filter: drop-shadow(0 2px 8px rgba(249,115,22,0.5));
  }

  .hex.p2 {
    background: linear-gradient(160deg, #67e8f9 0%, #22d3ee 50%, #0891b2 100%);
    color: #0c2a32;
    filter: drop-shadow(0 2px 8px rgba(34,211,238,0.5));
  }

  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 10px rgba(251,191,36,0.7)) drop-shadow(0 2px 4px rgba(0,0,0,0.4)); }
    50% { filter: drop-shadow(0 0 22px rgba(251,191,36,1)) drop-shadow(0 2px 4px rgba(0,0,0,0.4)); }
  }

  /* Players */
  .players {
    display: flex;
    justify-content: space-between;
    width: 100%;
    gap: 12px;
  }

  .player-card {
    flex: 1;
    border-radius: 14px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid transparent;
  }

  .player-card.p1 {
    background: linear-gradient(135deg, rgba(249,115,22,0.15), rgba(234,88,12,0.08));
    border-color: rgba(249,115,22,0.3);
  }
  .player-card.p2 {
    background: linear-gradient(135deg, rgba(34,211,238,0.15), rgba(8,145,178,0.08));
    border-color: rgba(34,211,238,0.3);
    flex-direction: row-reverse;
    text-align: right;
  }

  .player-hex {
    width: 36px;
    height: 42px;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    flex-shrink: 0;
  }
  .player-card.p1 .player-hex { background: linear-gradient(135deg, #fb923c, #c2410c); }
  .player-card.p2 .player-hex { background: linear-gradient(135deg, #67e8f9, #0891b2); }

  .player-info .name {
    font-size: 1rem;
    font-weight: 700;
    color: #f1f5f9;
  }
  .player-info .score {
    font-size: 0.8rem;
    color: #94a3b8;
    margin-top: 2px;
  }
  .player-info .score strong {
    color: #cbd5e1;
  }

  .player-card.p1 .player-info { text-align: left; }
  .player-card.p2 .player-info { text-align: right; }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(251,191,36,0.1);
    border: 1px solid rgba(251,191,36,0.3);
    border-radius: 10px;
    padding: 8px 18px;
    font-size: 0.85rem;
    color: #fbbf24;
  }
  .status-dot {
    width: 8px; height: 8px;
    background: #fbbf24;
    border-radius: 50%;
    animation: pulse-dot 1s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<div class="game-wrapper">

  <!-- Title + round -->
  <div class="game-title">
    <h1>AZkvíz</h1>
    <span class="round-badge">1. kolo</span>
  </div>

  <div class="round-switcher">
    <button class="round-btn active" onclick="setRound('numbers')">Čísla (1–28)</button>
    <button class="round-btn" onclick="setRound('letters')">Písmena (A–Ž)</button>
  </div>

  <!-- Board -->
  <div class="board-container" id="board"></div>

  <!-- Status -->
  <div class="status-bar">
    <div class="status-dot"></div>
    Aktivní otázka č. <strong id="active-label" style="margin-left:4px;color:#fde68a">13</strong>
  </div>

  <!-- Players -->
  <div class="players">
    <div class="player-card p1">
      <div class="player-hex"></div>
      <div class="player-info">
        <div class="name">Jakub</div>
        <div class="score">Získáno: <strong>5 polí</strong></div>
      </div>
    </div>
    <div class="player-card p2">
      <div class="player-hex"></div>
      <div class="player-info">
        <div class="name">Lukáš</div>
        <div class="score">Získáno: <strong>4 pole</strong></div>
      </div>
    </div>
  </div>

</div>

<script>
const NUMBERS = Array.from({length:28}, (_,i) => String(i+1));
const LETTERS = ['A','B','C','Č','D','E','F','G','H','Ch','I','J','K','L','M','N','O','P','R','Ř','S','Š','T','U','V','W','Z','Ž'];

// Demo: some claimed
const claimedP1 = new Set([1,2,4,8,9,16]);
const claimedP2 = new Set([3,5,6,11,17]);
const activeNum = 13;

let currentRound = 'numbers';

function buildBoard(round) {
  const board = document.getElementById('board');
  board.innerHTML = '';
  const items = round === 'numbers' ? NUMBERS : LETTERS;
  const activeLabel = document.getElementById('active-label');

  let idx = 0;
  for (let row = 0; row < 7; row++) {
    const rowEl = document.createElement('div');
    rowEl.className = 'hex-row';
    const count = row + 1;

    for (let col = 0; col < count; col++) {
      const num = idx + 1;
      const label = items[idx];
      idx++;

      const hex = document.createElement('div');
      hex.className = 'hex';
      hex.textContent = label;

      if (num === activeNum) {
        hex.classList.add('active');
        if (activeLabel) activeLabel.textContent = label;
      } else if (claimedP1.has(num)) {
        hex.classList.add('p1');
      } else if (claimedP2.has(num)) {
        hex.classList.add('p2');
      } else {
        hex.classList.add('free');
      }

      rowEl.appendChild(hex);
    }
    board.appendChild(rowEl);
  }
}

function setRound(round) {
  currentRound = round;
  document.querySelectorAll('.round-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && round === 'numbers') || (i === 1 && round === 'letters'));
  });
  const badge = document.querySelector('.round-badge');
  badge.textContent = round === 'numbers' ? '1. kolo' : '2. kolo';
  buildBoard(round);
}

buildBoard('numbers');
</script>
</body>
</html>
