<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZKvíz — Moderátor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh; width: 100vw;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 380px;
    grid-template-rows: 48px 1fr;
    gap: 0;
    color: #f1f5f9;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='52' viewBox='0 0 60 52' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolygon points='30,2 58,16 58,36 30,50 2,36 2,16' fill='none' stroke='%23ffffff06' stroke-width='1'/%3E%3C/svg%3E");
    background-size: 60px 52px;
    pointer-events: none; z-index: 0;
  }

  /* ── TOP BAR ── */
  .topbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    z-index: 10;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .topbar-title {
    font-size: 1.1rem; font-weight: 900;
    background: linear-gradient(135deg, #f97316, #fbbf24);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .mod-badge {
    background: rgba(139,92,246,0.2);
    border: 1px solid rgba(139,92,246,0.4);
    border-radius: 20px; padding: 2px 10px;
    font-size: 0.7rem; font-weight: 600;
    color: #a78bfa; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .round-switcher {
    display: flex; gap: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px; padding: 3px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .round-btn {
    padding: 3px 12px; border-radius: 5px; border: none;
    font-size: 0.75rem; font-weight: 600; cursor: pointer;
    color: #64748b; background: transparent; transition: all 0.2s;
  }
  .round-btn.active {
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: white; box-shadow: 0 1px 8px rgba(249,115,22,0.4);
  }

  /* ── LEFT: BOARD ── */
  .board-panel {
    position: relative; z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px;
    border-right: 1px solid rgba(255,255,255,0.07);
    gap: 10px;
  }

  .board { display: flex; flex-direction: column; align-items: center; }

  :root { --hex-w: 52px; --hex-h: 60px; --hex-gap: 3px; --overlap: 15px; }

  .hex-row {
    display: flex; justify-content: center;
    gap: var(--hex-gap);
    margin-top: calc(-1 * var(--overlap));
  }
  .hex-row:first-child { margin-top: 0; }

  .hex {
    width: var(--hex-w); height: var(--hex-h);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; cursor: pointer;
    transition: transform 0.1s, filter 0.1s;
    font-size: calc(var(--hex-w) * 0.24);
    user-select: none; position: relative; z-index: 1;
  }
  .hex:hover { transform: scale(1.1); z-index: 10; }
  .hex.free {
    background: linear-gradient(160deg, #e2e8f0, #c8d5e3 60%, #94a3b8);
    color: #1e293b;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5));
  }
  .hex.active {
    background: linear-gradient(160deg, #fef08a, #fbbf24 55%, #d97706);
    color: #1c0f00;
    filter: drop-shadow(0 0 12px rgba(251,191,36,0.9));
    animation: pulse-hex 1.1s ease-in-out infinite;
    z-index: 20;
  }
  .hex.p1 {
    background: linear-gradient(160deg, #fdba74, #f97316 55%, #c2410c);
    color: white; filter: drop-shadow(0 2px 6px rgba(249,115,22,0.5));
  }
  .hex.p2 {
    background: linear-gradient(160deg, #a5f3fc, #22d3ee 55%, #0e7490);
    color: #042f2e; filter: drop-shadow(0 2px 6px rgba(34,211,238,0.5));
  }
  @keyframes pulse-hex {
    0%,100% { filter: drop-shadow(0 0 8px rgba(251,191,36,.7)); }
    50%      { filter: drop-shadow(0 0 18px rgba(251,191,36,1)); }
  }

  /* players mini */
  .players-mini { display: flex; gap: 8px; width: 100%; }
  .pmini {
    flex: 1; border-radius: 10px; padding: 8px 12px;
    display: flex; align-items: center; gap: 8px;
    border: 1px solid transparent;
  }
  .pmini.p1 { background: rgba(249,115,22,.15); border-color: rgba(249,115,22,.3); }
  .pmini.p2 { background: rgba(34,211,238,.15); border-color: rgba(34,211,238,.3); flex-direction: row-reverse; }
  .pmini-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .pmini.p1 .pmini-dot { background: #f97316; box-shadow: 0 0 6px #f97316; }
  .pmini.p2 .pmini-dot { background: #22d3ee; box-shadow: 0 0 6px #22d3ee; }
  .pmini-name { font-size: 0.9rem; font-weight: 700; color: #f1f5f9; }
  .pmini.p2 .pmini-name { text-align: right; }

  /* ── RIGHT: CONTROL PANEL ── */
  .control-panel {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    padding: 16px;
    gap: 12px;
    overflow-y: auto;
  }

  .section-label {
    font-size: 0.65rem; font-weight: 700;
    color: #475569; letter-spacing: 1.5px;
    text-transform: uppercase; margin-bottom: 2px;
  }

  /* Active question display */
  .active-hex-display {
    display: flex; align-items: center; gap: 12px;
    background: rgba(251,191,36,0.08);
    border: 1px solid rgba(251,191,36,0.2);
    border-radius: 12px; padding: 12px 14px;
  }
  .active-hex-big {
    width: 52px; height: 60px;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    background: linear-gradient(160deg, #fef08a, #fbbf24 55%, #d97706);
    color: #1c0f00; font-weight: 900; font-size: 1.3rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    filter: drop-shadow(0 0 10px rgba(251,191,36,0.7));
  }
  .active-hex-info .label { font-size: 0.7rem; color: #94a3b8; }
  .active-hex-info .value {
    font-size: 1.1rem; font-weight: 800; color: #fde68a;
    margin-top: 2px;
  }

  /* Question card */
  .question-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 14px;
    display: flex; flex-direction: column; gap: 10px;
    flex: 1;
  }
  .question-text {
    font-size: 1rem; font-weight: 500;
    color: #e2e8f0; line-height: 1.5;
  }
  .divider { height: 1px; background: rgba(255,255,255,0.08); }
  .answer-reveal {
    display: flex; align-items: flex-start; gap: 8px;
  }
  .answer-label {
    font-size: 0.65rem; font-weight: 700; color: #22d3ee;
    letter-spacing: 1px; text-transform: uppercase;
    padding-top: 2px; flex-shrink: 0;
  }
  .answer-text {
    font-size: 1rem; font-weight: 700; color: #a5f3fc;
    line-height: 1.4;
  }

  /* Action buttons */
  .actions { display: flex; flex-direction: column; gap: 8px; }

  .btn-claim {
    width: 100%; padding: 12px;
    border: none; border-radius: 10px;
    font-size: 0.95rem; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-claim.p1 {
    background: linear-gradient(135deg, #f97316, #c2410c);
    color: white; box-shadow: 0 2px 12px rgba(249,115,22,0.35);
  }
  .btn-claim.p1:hover { box-shadow: 0 4px 20px rgba(249,115,22,0.6); transform: translateY(-1px); }
  .btn-claim.p2 {
    background: linear-gradient(135deg, #22d3ee, #0e7490);
    color: #042f2e; box-shadow: 0 2px 12px rgba(34,211,238,0.35);
  }
  .btn-claim.p2:hover { box-shadow: 0 4px 20px rgba(34,211,238,0.6); transform: translateY(-1px); }

  .btn-row { display: flex; gap: 8px; }
  .btn-secondary {
    flex: 1; padding: 10px;
    border-radius: 10px; border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
    color: #94a3b8; font-size: 0.85rem; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.1); color: #f1f5f9; }
  .btn-danger {
    flex: 1; padding: 10px;
    border-radius: 10px; border: 1px solid rgba(239,68,68,0.25);
    background: rgba(239,68,68,0.07);
    color: #f87171; font-size: 0.85rem; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-danger:hover { background: rgba(239,68,68,0.15); }

  /* next question hint */
  .next-hint {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px; padding: 10px 12px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .next-hint .nq-text { font-size: 0.8rem; color: #64748b; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-title">AZkvíz</span>
    <span class="mod-badge">Moderátor</span>
  </div>
  <div class="round-switcher">
    <button class="round-btn active">Čísla 1–28</button>
    <button class="round-btn">Písmena A–Ž</button>
  </div>
  <div style="font-size:0.75rem;color:#475569;">Hra probíhá · Kolo 1</div>
</div>

<!-- LEFT: BOARD + PLAYERS -->
<div class="board-panel">
  <div class="board" id="board"></div>
  <div class="players-mini">
    <div class="pmini p1">
      <div class="pmini-dot"></div>
      <div class="pmini-name">Jakub</div>
    </div>
    <div class="pmini p2">
      <div class="pmini-dot"></div>
      <div class="pmini-name">Lukáš</div>
    </div>
  </div>
</div>

<!-- RIGHT: CONTROL PANEL -->
<div class="control-panel">

  <div>
    <div class="section-label">Aktivní pole</div>
    <div class="active-hex-display">
      <div class="active-hex-big">13</div>
      <div class="active-hex-info">
        <div class="label">Číslo pole</div>
        <div class="value">13 / 28</div>
      </div>
    </div>
  </div>

  <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
    <div class="section-label">Otázka</div>
    <div class="question-card" style="flex:1;">
      <div class="question-text">
        Jak se jmenuje nejvyšší hora světa?
      </div>
      <div class="divider"></div>
      <div class="answer-reveal">
        <div class="answer-label">Odpověď</div>
        <div class="answer-text">Mount Everest (8 849 m)</div>
      </div>
    </div>
  </div>

  <div class="actions">
    <div class="section-label">Přiřadit pole</div>
    <button class="btn-claim p1">🟠 Jakub získal pole</button>
    <button class="btn-claim p2">🔵 Lukáš získal pole</button>
    <div class="btn-row">
      <button class="btn-secondary">⏭ Přeskočit</button>
      <button class="btn-danger">↺ Reset hry</button>
    </div>
  </div>

  <div>
    <div class="section-label">Následující otázka</div>
    <div class="next-hint">
      <div class="nq-text">Pole 14 · Připravena otázka</div>
    </div>
  </div>

</div>

<script>
const NUMBERS = Array.from({length:28}, (_,i) => String(i+1));
const claimedP1 = new Set([1,2,4,8,9,16]);
const claimedP2 = new Set([3,5,6,11,17]);
const activeNum = 13;

function calcHexSize() {
  const GAP = 3;
  const availH = window.innerHeight - 48 - 10 - 60 - 32;
  const availW = (window.innerWidth - 380) - 24;
  const hexHfromH = availH / 5.5;
  const hexHfromW = (availW - 6 * GAP) / (7 * 0.866);
  const hexH = Math.floor(Math.min(hexHfromH, hexHfromW));
  const hexW = Math.floor(hexH * 0.866);
  const overlap = Math.floor(hexH * 0.25);
  document.documentElement.style.setProperty('--hex-w', hexW + 'px');
  document.documentElement.style.setProperty('--hex-h', hexH + 'px');
  document.documentElement.style.setProperty('--overlap', overlap + 'px');
}

function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  let idx = 0;
  for (let row = 0; row < 7; row++) {
    const rowEl = document.createElement('div');
    rowEl.className = 'hex-row';
    for (let col = 0; col <= row; col++) {
      const num = ++idx;
      const hex = document.createElement('div');
      hex.className = 'hex';
      hex.textContent = String(num);
      if (num === activeNum) hex.classList.add('active');
      else if (claimedP1.has(num)) hex.classList.add('p1');
      else if (claimedP2.has(num)) hex.classList.add('p2');
      else hex.classList.add('free');
      rowEl.appendChild(hex);
    }
    board.appendChild(rowEl);
  }
}

window.addEventListener('resize', calcHexSize);
calcHexSize();
buildBoard();
</script>
</body>
</html>
