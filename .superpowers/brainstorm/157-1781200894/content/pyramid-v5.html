<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZKvíz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --hex-w: 80px;
    --hex-h: 92px;
    --hex-gap: 5px;
    --overlap: 23px;
  }

  body {
    background: #0d1117;
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    gap: 6px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='52' viewBox='0 0 60 52' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolygon points='30,2 58,16 58,36 30,50 2,36 2,16' fill='none' stroke='%23ffffff07' stroke-width='1'/%3E%3C/svg%3E");
    background-size: 60px 52px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── TOP BAR ── */
  .top-bar {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    gap: 12px;
    flex-shrink: 0;
    height: 52px;
  }

  .game-title {
    font-size: 1.8rem;
    font-weight: 900;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #f97316, #fbbf24);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    white-space: nowrap;
  }

  .round-switcher {
    display: flex;
    gap: 5px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 4px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .round-btn {
    padding: 6px 18px;
    border-radius: 8px;
    border: none;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    color: #64748b;
    background: transparent;
  }
  .round-btn.active {
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: white;
    box-shadow: 0 2px 10px rgba(249,115,22,0.4);
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(251,191,36,0.1);
    border: 1px solid rgba(251,191,36,0.25);
    border-radius: 24px;
    padding: 6px 18px;
    font-size: 1rem;
    color: #fbbf24;
    white-space: nowrap;
    font-weight: 500;
  }
  .status-pill strong {
    font-size: 1.2rem;
    font-weight: 800;
    color: #fde68a;
  }
  .status-dot {
    width: 8px; height: 8px;
    background: #fbbf24;
    border-radius: 50%;
    animation: blink 1s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* ── BOARD ── */
  .board-wrap {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    width: 100%;
    min-height: 0;
  }

  .board {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .hex-row {
    display: flex;
    justify-content: center;
    gap: var(--hex-gap);
    margin-top: calc(-1 * var(--overlap));
  }
  .hex-row:first-child { margin-top: 0; }

  .hex {
    width: var(--hex-w);
    height: var(--hex-h);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    cursor: default;
    transition: transform 0.12s, filter 0.12s;
    font-size: calc(var(--hex-w) * 0.22);
    user-select: none;
    position: relative;
    z-index: 1;
  }
  .hex:hover { transform: scale(1.08); z-index: 10; }

  .hex.free {
    background: linear-gradient(160deg, #e2e8f0 0%, #c8d5e3 60%, #94a3b8 100%);
    color: #1e293b;
    filter: drop-shadow(0 3px 5px rgba(0,0,0,0.5));
  }
  .hex.active {
    background: linear-gradient(160deg, #fef08a 0%, #fbbf24 55%, #d97706 100%);
    color: #1c0f00;
    filter: drop-shadow(0 0 16px rgba(251,191,36,0.9)) drop-shadow(0 3px 5px rgba(0,0,0,0.4));
    animation: pulse-hex 1.1s ease-in-out infinite;
    z-index: 20;
  }
  .hex.p1 {
    background: linear-gradient(160deg, #fdba74 0%, #f97316 55%, #c2410c 100%);
    color: white;
    filter: drop-shadow(0 3px 8px rgba(249,115,22,0.55));
  }
  .hex.p2 {
    background: linear-gradient(160deg, #a5f3fc 0%, #22d3ee 55%, #0e7490 100%);
    color: #042f2e;
    filter: drop-shadow(0 3px 8px rgba(34,211,238,0.55));
  }
  @keyframes pulse-hex {
    0%,100% { filter: drop-shadow(0 0 10px rgba(251,191,36,.7)) drop-shadow(0 3px 5px rgba(0,0,0,.4)); }
    50%      { filter: drop-shadow(0 0 24px rgba(251,191,36,1))  drop-shadow(0 3px 5px rgba(0,0,0,.4)); }
  }

  /* ── PLAYERS ── */
  .players {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 12px;
    width: 100%;
    flex-shrink: 0;
    height: 72px;
  }

  .player-card {
    flex: 1;
    border-radius: 14px;
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    border: 1px solid transparent;
    height: 100%;
  }
  .player-card.p1 {
    background: linear-gradient(135deg, rgba(249,115,22,.2), rgba(234,88,12,.08));
    border-color: rgba(249,115,22,.35);
  }
  .player-card.p2 {
    background: linear-gradient(135deg, rgba(34,211,238,.2), rgba(8,145,178,.08));
    border-color: rgba(34,211,238,.35);
    flex-direction: row-reverse;
  }

  .player-hex-icon {
    width: 40px; height: 46px;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    flex-shrink: 0;
  }
  .player-card.p1 .player-hex-icon { background: linear-gradient(135deg,#fb923c,#c2410c); }
  .player-card.p2 .player-hex-icon { background: linear-gradient(135deg,#67e8f9,#0e7490); }

  .player-name {
    font-size: 1.35rem;
    font-weight: 800;
    color: #f1f5f9;
    letter-spacing: -0.3px;
  }
  .player-card.p1 .player-name { text-align: left; }
  .player-card.p2 .player-name { text-align: right; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="game-title">AZkvíz</div>
  <div class="round-switcher">
    <button class="round-btn active" onclick="setRound('numbers')">Čísla 1–28</button>
    <button class="round-btn" onclick="setRound('letters')">Písmena A–Ž</button>
  </div>
  <div class="status-pill">
    <div class="status-dot"></div>
    Aktivní otázka:&nbsp;<strong id="active-label">13</strong>
  </div>
</div>

<!-- BOARD -->
<div class="board-wrap">
  <div class="board" id="board"></div>
</div>

<!-- PLAYERS -->
<div class="players">
  <div class="player-card p1">
    <div class="player-hex-icon"></div>
    <div class="player-name">Jakub</div>
  </div>
  <div class="player-card p2">
    <div class="player-hex-icon"></div>
    <div class="player-name">Lukáš</div>
  </div>
</div>

<script>
const NUMBERS = Array.from({length:28}, (_,i) => String(i+1));
const LETTERS = ['A','B','C','Č','D','E','F','G','H','Ch','I','J','K','L','M','N','O','P','R','Ř','S','Š','T','U','V','W','Z','Ž'];

const claimedP1 = new Set([1,2,4,8,9,16]);
const claimedP2 = new Set([3,5,6,11,17]);
const activeNum = 13;
let currentRound = 'numbers';

function calcHexSize() {
  const GAP = 5;
  // reserved: top-bar 52px + players 72px + body gaps ~28px + paddings 16px = 168px
  const nonBoardH = 168;
  const availH = window.innerHeight - nonBoardH;
  const availW = window.innerWidth - 24;

  // total pyramid height = hex_h + 6*(hex_h * 0.75) = hex_h * 5.5
  const hexHfromH = availH / 5.5;
  // widest row: 7*hex_w + 6*GAP, hex_w = hex_h * 0.866
  const hexHfromW = (availW - 6 * GAP) / (7 * 0.866);

  const hexH = Math.floor(Math.min(hexHfromH, hexHfromW));
  const hexW = Math.floor(hexH * 0.866);
  const overlap = Math.floor(hexH * 0.25);

  document.documentElement.style.setProperty('--hex-w', hexW + 'px');
  document.documentElement.style.setProperty('--hex-h', hexH + 'px');
  document.documentElement.style.setProperty('--overlap', overlap + 'px');
}

function buildBoard(round) {
  const board = document.getElementById('board');
  board.innerHTML = '';
  const items = round === 'numbers' ? NUMBERS : LETTERS;
  const activeEl = document.getElementById('active-label');

  let idx = 0;
  for (let row = 0; row < 7; row++) {
    const rowEl = document.createElement('div');
    rowEl.className = 'hex-row';
    for (let col = 0; col <= row; col++) {
      const num = idx + 1;
      const label = items[idx++];
      const hex = document.createElement('div');
      hex.className = 'hex';
      hex.textContent = label;
      if (num === activeNum) {
        hex.classList.add('active');
        if (activeEl) activeEl.textContent = label;
      } else if (claimedP1.has(num)) {
        hex.classList.add('p1');
      } else if (claimedP2.has(num)) {
        hex.classList.add('p2');
      } else {
        hex.classList.add('free');
      }
      rowEl.appendChild(hex);
    }
    board.appendChild(rowEl);
  }
}

function setRound(round) {
  currentRound = round;
  document.querySelectorAll('.round-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i===0&&round==='numbers')||(i===1&&round==='letters'));
  });
  buildBoard(round);
}

window.addEventListener('resize', calcHexSize);
calcHexSize();
buildBoard(currentRound);
</script>
</body>
</html>
