<h2>Herní plocha — pyramida</h2>
<p class="subtitle">A nahoře, každý řádek o jedno pole širší</p>

<div class="mockup" style="max-width: 900px; margin: 0 auto;">
  <div class="mockup-header">Herní plocha (veřejný pohled)</div>
  <div class="mockup-body" style="background: #0f172a; padding: 32px 24px;">

    <!-- Player headers -->
    <div style="display: flex; justify-content: space-between; margin-bottom: 24px;">
      <div style="background: #1d4ed8; border-radius: 8px; padding: 8px 20px; color: white; font-weight: bold;">🔵 Tým 1</div>
      <div style="background: #dc2626; border-radius: 8px; padding: 8px 20px; color: white; font-weight: bold;">Tým 2 🔴</div>
    </div>

    <!-- Pyramid hex board -->
    <div id="board" style="display: flex; flex-direction: column; align-items: center; gap: 3px;">
    </div>

    <!-- Legend -->
    <div style="display: flex; justify-content: center; gap: 20px; margin-top: 20px; font-size: 0.8em; color: #94a3b8;">
      <span><span style="display:inline-block;width:12px;height:12px;background:#1e40af;border-radius:2px;margin-right:4px;"></span>Tým 1</span>
      <span><span style="display:inline-block;width:12px;height:12px;background:#991b1b;border-radius:2px;margin-right:4px;"></span>Tým 2</span>
      <span><span style="display:inline-block;width:12px;height:12px;background:#ca8a04;border-radius:2px;margin-right:4px;"></span>Aktivní</span>
      <span><span style="display:inline-block;width:12px;height:12px;background:#1e293b;border:1px solid #334155;border-radius:2px;margin-right:4px;"></span>Volné</span>
    </div>
  </div>
</div>

<script>
// Czech letters A-Z + Á,Č,Ď,É,Í,Ň,Ó,Ř,Š,Ť,Ú,Ů,Ý,Ž would be too many
// Using standard A-Z (26 letters) for now
const letters = ['A','B','C','D','E','F','G','H','I','J','K','L','M','N','O','P','R','S','T','U','V','W','X','Y','Z','Ž'];

// Pyramid rows: 1,2,3,4,5,6,5 = 26 letters
const rows = [1, 2, 3, 4, 5, 6, 5];

// Sample claimed state (for demo)
const claimed = {
  'A': 1, 'B': 1, 'C': 2, 'G': 1, 'H': 2, 'L': 2,
  'P': 1, 'S': 2, 'T': 1,
};
const active = 'K';

const HEX_W = 58;
const HEX_H = 52;
const GAP = 4;

const board = document.getElementById('board');
let letterIdx = 0;

rows.forEach((count, rowIdx) => {
  const rowEl = document.createElement('div');
  rowEl.style.display = 'flex';
  rowEl.style.gap = GAP + 'px';

  // offset: odd rows (0-indexed) shift right by half hex width
  // to create interlocking hex pattern
  if (rowIdx % 2 === 1) {
    rowEl.style.marginLeft = ((HEX_W + GAP) / 2) + 'px';
  }

  for (let i = 0; i < count; i++) {
    const letter = letters[letterIdx++];
    const cell = document.createElement('div');

    let bg = '#1e293b';
    let color = '#64748b';
    let border = '2px solid #334155';

    if (letter === active) {
      bg = '#ca8a04';
      color = '#fff';
      border = '2px solid #fbbf24';
    } else if (claimed[letter] === 1) {
      bg = '#1e40af';
      color = '#fff';
      border = '2px solid #3b82f6';
    } else if (claimed[letter] === 2) {
      bg = '#991b1b';
      color = '#fff';
      border = '2px solid #ef4444';
    }

    cell.style.cssText = `
      width: ${HEX_W}px;
      height: ${HEX_H}px;
      background: ${bg};
      border: ${border};
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: ${color};
      font-weight: bold;
      font-size: 1em;
      font-family: sans-serif;
      cursor: default;
      transition: transform 0.15s;
    `;
    cell.textContent = letter;
    rowEl.appendChild(cell);
  }

  board.appendChild(rowEl);
});
</script>
