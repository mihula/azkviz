<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AZKviz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --text: #e8eaf6;
      --muted: #8b8fa8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }

    /* Hex background */
    .hex-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.04;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 3.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .logo-hex {
      width: 48px;
      height: 48px;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 0.75rem;
      font-size: 1rem;
      line-height: 1.5;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 2rem 0;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      cursor: pointer;
    }

    .btn:hover { transform: translateY(-2px); opacity: 0.92; }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff;
      box-shadow: 0 8px 24px rgba(108,99,255,0.35);
    }

    .btn-secondary {
      background: var(--bg);
      color: var(--muted);
      border: 1px solid var(--border);
      margin-top: 0.75rem;
      font-size: 0.9rem;
    }

    .btn-secondary:hover { color: var(--text); border-color: var(--muted); }

    .btn svg { flex-shrink: 0; }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 1.75rem;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>

  <!-- Hex grid background -->
  <svg class="hex-bg" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="hex" x="0" y="0" width="56" height="48" patternUnits="userSpaceOnUse">
        <polygon points="14,2 42,2 56,26 42,46 14,46 0,26" fill="none" stroke="white" stroke-width="1"/>
        <polygon points="14,26 42,26 56,50 42,70 14,70 0,50" fill="none" stroke="white" stroke-width="1"/>
        <polygon points="42,2 70,2 84,26 70,46 42,46 28,26" fill="none" stroke="white" stroke-width="1"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#hex)"/>
  </svg>

  <div class="card">

    <div class="logo">
      <!-- Hex icon -->
      <svg class="logo-hex" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="24,3 43,13.5 43,34.5 24,45 5,34.5 5,13.5"
          fill="url(#hexgrad)" stroke="none"/>
        <defs>
          <linearGradient id="hexgrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#6c63ff"/>
            <stop offset="100%" stop-color="#ff6584"/>
          </linearGradient>
        </defs>
        <text x="24" y="30" text-anchor="middle" font-size="18" font-weight="bold"
          fill="white" font-family="Segoe UI, sans-serif">Q</text>
      </svg>
    </div>

    <h1>AZKviz</h1>
    <p class="subtitle">Kvízová hra na hexagonální desce.<br>Kdo obsadí více polí, vyhrává.</p>

    <div class="divider"></div>

    <a class="btn btn-primary" href="https://client-production-6bdc.up.railway.app/" target="_blank">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
      Hrát hru
    </a>

    <a class="btn btn-secondary" href="https://client-production-6bdc.up.railway.app/moderator" target="_blank">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      Přihlášení moderátora
    </a>

    <div class="status">
      <span class="dot"></span>
      Hra běží na Railway
    </div>

  </div>

</body>
</html>
